<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CGI</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }

        a.back { color: #7f5af0; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 1.5rem; }

        h1 { font-size: 2rem; margin-bottom: 1rem; }
        h1 span { color: #0f8abf; }

        .test-card {
            background: #141414;
            border: 1px solid #1e1e1e;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        button {
            background: linear-gradient(135deg, #e53835, #7f5af0);
            border: none;
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 0.5rem;
        }

        .file-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .result {
            margin-top: 1rem;
            font-size: 0.9rem;
            background: #0a0a0a;
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid #222;

			max-height: 500px;
			overflow: auto;
        }
		.result img {
			max-width: 100%;
			max-height: 250px;
			width: 900;
			height: 900;
			object-fit: contain;
			border-radius: 8px;
		}

        .error { color: #e53835; }
        .ok { color: #22c55e; }
    </style>
</head>

<body>
<div class="container">

    <a class="back" href="/">← Back</a>

    <h1>CGI <span>Scripts</span></h1>

    <div class="test-card">
        <h3 style="margin-bottom:1rem;">CGI Scripts (/cgi-bin)</h3>
        <button onclick="loadCGIs()">Refresh</button>

        <div id="cgi-list" style="margin-top:1rem;"></div>

        <!-- 🔥 RESULTADO ÚNICO -->
        <div id="cgi-result" class="result"></div>
    </div>

</div>

<script>

// ================= CGI =================
async function loadCGIs() {
    const container = document.getElementById("cgi-list");
    container.innerHTML = "Loading...";

    try {
        const res = await fetch("/cgi-bin/");

        if (!res.ok) {
            container.innerHTML = "<div class='error'>❌ CGI folder not found</div>";
            return;
        }

        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, "text/html");

        const links = [...doc.querySelectorAll("a")]
            .map(a => a.getAttribute("href"))
            .filter(href => href && !href.includes("..") && href !== "/");

        if (links.length === 0) {
            container.innerHTML = "⚙️ No CGI scripts found";
            return;
        }

        container.innerHTML = "";

        links.forEach(file => {
            if (file.endsWith("/")) return;

            const row = document.createElement("div");
            row.className = "file-row";

            const name = document.createElement("span");
            name.innerText = file;

            const btn = document.createElement("button");
            btn.innerText = "Run";
            btn.onclick = () => runCGI("/cgi-bin/" + file);

            row.appendChild(name);
            row.appendChild(btn);
            container.appendChild(row);
        });

    } catch {
        container.innerHTML = "<div class='error'>🌐 Network error</div>";
    }
}

// ================= RUN CGI =================
async function runCGI(url, options = {}) {
    const result = document.getElementById("cgi-result");

    result.innerText = "Executing " + url + "...";

    try {
        const res = await fetch(url, options);
        const text = await res.text();

        result.innerHTML =
            "<div class='" + (res.ok ? "ok" : "error") + "'>" +
            "HTTP " + res.status +
            "</div>\n" +
            text;

        // 🔥 scroll automático
        result.scrollIntoView({ behavior: "smooth" });

    } catch {
        result.innerHTML = "<div class='error'>Error executing CGI</div>";
    }
}

// ================= INTERCEPTAR LINKS =================
document.addEventListener("click", function(e) {
    const link = e.target.closest("a");

    if (!link) return;

    const href = link.getAttribute("href");

    if (href && href.startsWith("/cgi-bin/")) {
        e.preventDefault();
        runCGI(href);
    }
});

// ================= INTERCEPTAR FORMULARIOS =================
document.addEventListener("submit", async function(e) {
    const form = e.target;

    if (!form.action.includes("/cgi-bin/")) return;

    e.preventDefault();

    const method = (form.method || "GET").toUpperCase();
    const formData = new FormData(form);

    let url = form.action;
    let options = { method };

    if (method === "GET") {
        const params = new URLSearchParams(formData).toString();
        if (params) url += "?" + params;
    } else {
        options.body = formData;
    }

    runCGI(url, options);
});

// auto load
window.onload = () => {
    loadCGIs();
};

</script>

</body>
</html>
