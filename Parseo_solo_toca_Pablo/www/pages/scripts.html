<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CGI</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }

        a.back { color: #7f5af0; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 1.5rem; }

        h1 { font-size: 2rem; margin-bottom: 1rem; }
        h1 span { color: #0f8abf; }

        .test-card {
            background: #141414;
            border: 1px solid #1e1e1e;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        button {
            background: linear-gradient(135deg, #e53835, #7f5af0);
            border: none;
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 0.5rem;
        }

        input {
            background: #0a0a0a;
            border: 1px solid #333;
            color: #ccc;
            padding: 0.5rem;
            border-radius: 6px;
            width: 100%;
            margin-bottom: 1rem;
            font-family: monospace;
        }

        .file-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .result {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            background: #0a0a0a;
            padding: 0.5rem;
            border-radius: 6px;
            border: 1px solid #222;
            white-space: pre-wrap;
        }

        .error { color: #e53835; }
        .ok { color: #22c55e; }
    </style>
</head>

<body>
<div class="container">

    <a class="back" href="/">← Back</a>

    <h1>CGI <span>Scripts</span></h1>

    <!-- ===================== UPLOAD FILES ===================== -->

    <!-- ===================== CGI ===================== -->
    <div class="test-card">
        <h3 style="margin-bottom:1rem;">CGI Scripts (/cgi-bin)</h3>
        <button onclick="loadCGIs()">Refresh</button>
        <div id="cgi-list" style="margin-top:1rem;"></div>
    </div>

</div>

<script>

// ================= CGI =================
async function loadCGIs() {
    const container = document.getElementById("cgi-list");
    container.innerHTML = "Loading...";

    try {
        const res = await fetch("/cgi-bin/");

        if (!res.ok) {
            container.innerHTML = "<div class='error'>❌ CGI folder not found</div>";
            return;
        }

        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, "text/html");

        const links = [...doc.querySelectorAll("a")]
            .map(a => a.getAttribute("href"))
            .filter(href => href && !href.includes("..") && href !== "/");

        if (links.length === 0) {
            container.innerHTML = "⚙️ No CGI scripts found";
            return;
        }

        container.innerHTML = "";

        links.forEach(file => {
            if (file.endsWith("/")) return;

            const row = document.createElement("div");
            row.className = "file-row";

            const name = document.createElement("span");
            name.innerText = file;

            const btn = document.createElement("button");
            btn.innerText = "Run";
            btn.onclick = () => runCGI(file);

            row.appendChild(name);
            row.appendChild(btn);
            container.appendChild(row);
        });

    } catch {
        container.innerHTML = "<div class='error'>🌐 Network error</div>";
    }
}

async function runCGI(file) {
    const container = document.getElementById("cgi-list");

    const result = document.createElement("div");
    result.className = "result";
    result.innerText = "Executing " + file + "...";

    container.appendChild(result);

    try {
        const res = await fetch("/cgi-bin/" + file);
        const text = await res.text();

        result.innerHTML = 
            "<div class='" + (res.ok ? "ok" : "error") + "'>" +
            "HTTP " + res.status +
            "</div>\n" +
            text.substring(0, 2000);

    } catch {
        result.innerHTML = "<div class='error'>Error executing CGI</div>";
    }
}

// auto load
window.onload = () => {

    loadCGIs();
};
</script>

</body>
</html>
