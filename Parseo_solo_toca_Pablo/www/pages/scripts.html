<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Control CGI</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0a0a0a; color: #e0e0e0; padding: 2rem;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; color: #7f5af0; margin-bottom: 2rem; }
    .card {
        background: #141414; border: 1px solid #1e1e1e;
        border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem;
        overflow: hidden;
    }
    h3 { margin-bottom: 1rem; }
    button {
        width: 100%; border: none; color: #fff; padding: 0.8rem;
        border-radius: 6px; cursor: pointer; font-weight: bold;
    }
    .btn-get  { background: #2cb67d; }
    .btn-php  { background: #0f8abf; }
    .btn-post { background: #7f5af0; }
    input {
        width: 100%; margin-bottom: 10px; padding: 10px;
        background: #000; color: #fff; border: 1px solid #333; border-radius: 4px;
    }

    /* Caja de resultados — contenedor de tamaño fijo */
    .result-viewport {
        margin-top: 15px;
        background: #000;
        border: 2px solid #222;
        border-radius: 8px;
        width: 100%;
        height: 600px;
        overflow-y: auto;
        overflow-x: hidden;
        display: none;
        padding: 15px;

        /* Container queries: las imágenes se miden respecto a esta caja */
        container-type: size;
    }

    /* Estilos para el contenido del juego inyectado */
    .result-viewport .game-menu {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 16px;
        margin-top: 16px;
    }
    .result-viewport .option {
        width: 200px;
        cursor: pointer;
        text-align: center;
        background: #1a1a1a;
        border-radius: 8px;
        padding: 10px;
        transition: transform 0.15s;
    }
    .result-viewport .option:hover { transform: scale(1.04); }
    .result-viewport img {
        max-width: 100%;
        max-height: 30cqh;
        width: auto;
        height: auto;
        object-fit: contain;
        display: block;
        margin: 0 auto 8px;
        border-radius: 6px;
    }
    .result-viewport .game-main img { max-height: 55cqh; }
    .result-viewport h1, .result-viewport h2, .result-viewport h3 {
        color: #fff; margin: 8px 0;
    }

    #res-post {
        margin-top: 10px; padding: 15px; background: #000;
        border-radius: 5px; display: none; color: #22c55e;
        border-left: 4px solid #7f5af0;
    }
</style>
</head>
<body>
<div class="container">
	<div class="container">

    <a class="back" href="/">← Back</a>

</div>
    <h1>CGI Master Control</h1>
	

    <!-- 1. JUEGO (GET) -->
    <div class="card">
        <h3>Anime Quiz (game.py)</h3>
        <button class="btn-get" onclick="loadGame('/cgi-bin/game.py')">Ejecutar Juego</button>
        <div id="res-game" class="result-viewport"></div>
    </div>

    <!-- 2. PHP (GET) -->
    <div class="card">
        <h3>System Info (test.php)</h3>
        <button class="btn-php" onclick="loadInto('/cgi-bin/test.php', 'res-php')">Ejecutar PHP</button>
        <div id="res-php" class="result-viewport"></div>
    </div>

    <!-- 3. POST -->
    <div class="card" style="border: 1px solid #7f5af0;">
        <h3>Crear Usuario (POST)</h3>
        <input type="text" id="post_nombre" placeholder="Nombre">
        <input type="text" id="post_apellido" placeholder="Apellido">
        <button class="btn-post" onclick="crearUsuario()">Enviar Datos</button>
        <div id="res-post"></div>
    </div>
</div>

<script>
    // Carga genérica GET dentro de una caja
    async function loadInto(url, boxId) {
        const box = document.getElementById(boxId);
        box.style.display = "block";
        box.innerHTML = "<div style='padding:20px;'>Cargando...</div>";
        try {
            const r = await fetch(url);
            box.innerHTML = await r.text();
            box.scrollTop = 0;
        } catch (e) {
            box.innerHTML = "<div style='padding:20px;color:red;'>Error al cargar.</div>";
        }
    }

    // Carga del juego — recarga dentro de la misma caja sin redirigir
    async function loadGame(url) {
        await loadInto(url, 'res-game');
    }

    // Delegación: clicks dentro de #res-game NO redirigen, recargan inline
    document.getElementById('res-game').addEventListener('click', function(e) {
        const target = e.target.closest('[data-step]');
        if (!target) return;
        e.preventDefault();
        const anime = target.dataset.anime || '';
        const step  = target.dataset.step;
        const qs = new URLSearchParams();
        if (anime) qs.set('anime', anime);
        qs.set('step', step);
        loadGame('/cgi-bin/game.py?' + qs.toString());
    });

    // POST crear usuario
    function crearUsuario() {
        const resDiv = document.getElementById("res-post");
        const n = document.getElementById("post_nombre").value;
        const a = document.getElementById("post_apellido").value;
        resDiv.style.display = "block";
        resDiv.innerHTML = "Enviando...";
        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/cgi-bin/crear_usuario.py", true);
        xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) resDiv.innerHTML = xhr.responseText;
        };
        xhr.send("nombre=" + encodeURIComponent(n) + "&apellido=" + encodeURIComponent(a));
    }
</script>
</body>
</html>
