<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DELETE</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }

        a.back { color: #7f5af0; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 1.5rem; }

        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        h1 span { color: #e53835; }

        .test-card {
            background: #141414;
            border: 1px solid #1e1e1e;
            border-radius: 12px;
            padding: 1.5rem;
        }

        input {
            background: #0a0a0a;
            border: 1px solid #333;
            color: #ccc;
            padding: 0.5rem;
            border-radius: 6px;
            width: 100%;
            margin-bottom: 1rem;
            font-family: monospace;
        }

        button {
            background: linear-gradient(135deg, #e53835, #7f5af0);
            border: none;
            color: #fff;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
        }

        .result {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #aaa;
        }
    </style>
</head>

<body>
<div class="container">

    <a class="back" href="/">← Back</a>

    <h1>DELETE <span>File</span></h1>

    <div class="test-card">

        <input id="filename" type="text" placeholder="example.txt">

        <button onclick="deleteFile()">Delete</button>

        <div id="result" class="result"></div>

    </div>

</div>

<script>
function deleteFile() {
    const file = document.getElementById("filename").value;

    fetch("/delete/" + file, {
        method: "DELETE"
    })
    .then(res => {
        if (res.ok)
            document.getElementById("result").innerText = "Deleted OK";
        else
            document.getElementById("result").innerText = "Error deleting file";
    })
    .catch(err => {
        document.getElementById("result").innerText = "Network error";
    });
}
</script>

</body>
</html>
