<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DELETE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }
        a.back { color: #7f5af0; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 1.5rem; }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        h1 span { color: #e53835; }
        .test-card { background: #141414; border: 1px solid #1e1e1e; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
        button { background: linear-gradient(135deg, #e53835, #7f5af0); border: none; color: #fff; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
        .file-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; padding: 0.5rem; background: #0a0a0a; border-radius: 6px; }
        .result { margin-top: 1rem; font-size: 0.9rem; padding: 0.75rem; border-radius: 6px; min-height: 1.5rem; }
        .result.ok { background: rgba(46, 204, 113, 0.15); color: #2ecc71; border: 1px solid #2ecc71; }
        .result.err { background: rgba(229, 56, 53, 0.15); color: #e53835; border: 1px solid #e53835; }
    </style>
</head>
<body>
<div class="container">
    <a class="back" href="/">← Back</a>
    <h1>DELETE <span>File</span></h1>

    <div class="test-card">
        <h3 style="margin-bottom:1rem;">Files in /upload</h3>
        <button onclick="loadFiles()">Refresh</button>
        <div id="file-list" style="margin-top:1rem;"></div>
        <div id="result" class="result"></div>
    </div>
</div>

<script>
function showResult(msg, ok) {
    const result = document.getElementById("result");
    result.innerText = msg;
    result.className = "result " + (ok ? "ok" : "err");
    clearTimeout(showResult._t);
    showResult._t = setTimeout(() => {
        result.innerText = "";
        result.className = "result";
    }, 4000);
}

async function loadFiles() {
    const container = document.getElementById("file-list");
    container.innerHTML = "Loading...";
    try {
        const res = await fetch("/upload/");
        if (!res.ok) {
            const text = await res.text();
            container.innerHTML = `<div style='color:#e53835;'>❌ Error ${res.status}: ${text}</div>`;
            return;
        }
        const html = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");
        const links = [...doc.querySelectorAll("a")]
            .map(a => a.getAttribute("href"))
            .filter(href => href && !href.includes("..") && href !== "/");

        if (links.length === 0) {
            container.innerHTML = "📂 Folder is empty";
            return;
        }
        container.innerHTML = "";
        links.forEach(file => {
            if (file.endsWith("/")) return;
            const row = document.createElement("div");
            row.className = "file-row";
            const name = document.createElement("span");
            name.innerText = decodeURIComponent(file);
            const btn = document.createElement("button");
            btn.innerText = "Delete";
            btn.onclick = () => deleteFile(file);
            row.appendChild(name);
            row.appendChild(btn);
            container.appendChild(row);
        });
    } catch (e) {
        container.innerHTML = "<div style='color:#e53835;'>🌐 Network error</div>";
    }
}

async function deleteFile(file) {
    try {
        const res = await fetch("/delete/" + file, { method: "DELETE" });
        if (res.ok) {
            showResult(`✅ Archivo borrado`, true);
            loadFiles();
        } else if (res.status === 404) {
            showResult(`❌ Archivo no encontrado`, false);
        } else if (res.status === 403) {
            showResult(`❌ Sin permisos para borrar`, false);
        } else {
            showResult(`❌ No se puede borrar el archivo`, false);
        }
    } catch (e) {
        showResult("🌐 Error de red", false);
    }
}

window.onload = loadFiles;
</script>
</body>
</html>
