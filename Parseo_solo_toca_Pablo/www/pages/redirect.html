<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirect</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }

        a.back {
            color: #7f5af0;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        h1 span { color: #7f5af0; }

        .desc { color: #888; margin-bottom: 2rem; }

        .test-card {
            background: #141414;
            border: 1px solid #1e1e1e;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }

        .success {
            font-size: 1.5rem;
            color: #22c55e;
            margin-top: 1rem;
        }

        .sub {
            color: #aaa;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
<div class="container">

    <a class="back" href="/">← Back</a>

    <h1>Redirect <span>Page</span></h1>
    <p class="desc">You have been redirected from another URL</p>

    <div class="test-card">

        <div class="success">
            ✔ Enhorabuena, has sido redireccionado
        </div>

        <div class="sub">
            La redirección se ha completado correctamente
        </div>

    </div>

</div>
</body>
</html>
