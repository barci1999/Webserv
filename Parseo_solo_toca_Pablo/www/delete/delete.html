<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Eliminar post</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#111827;
    margin:0;
}

header{
    background:#1f2937;
    color:white;
    padding:20px 40px;
}

header h1{
    margin:0;
}

.container{
    max-width:900px;
    margin:auto;
    padding:40px;
}

.card{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

label{
    font-weight:bold;
    display:block;
    margin-top:20px;
}

input{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    margin-top:25px;
    background:#dc2626;
    color:white;
    border:none;
    padding:12px 20px;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#b91c1c;
}

.info{
    margin-top:30px;
    background:#fef2f2;
    padding:20px;
    border-radius:8px;
}

code{
    background:#e5e7eb;
    padding:4px 6px;
    border-radius:4px;
}

#result{
    margin-top:20px;
    font-weight:bold;
}

</style>

</head>

<body>

<header>
<h1>MiniForum</h1>
<p>Eliminar hilo</p>
</header>

<div class="container">

<div class="card">

<h2>Eliminar un Post</h2>

<p>Introduce el ID del post que deseas eliminar.</p>

<label>ID del post</label>
<input type="text" id="postId" placeholder="Ej: 42">

<button onclick="deletePost()">Eliminar Post</button>

<p id="result"></p>

</div>

<div class="info">

<h3>Información para probar DELETE</h3>

<p>La página enviará una petición:</p>

<code>DELETE /delete/post_id</code>

<p>Ejemplo:</p>

<code>DELETE /delete/42</code>

<p>También puedes probar con curl:</p>

<pre>
curl -X DELETE http://localhost:8080/delete/42
</pre>

</div>

</div>

<script>

function deletePost() {

    const id = document.getElementById("postId").value;

    if(!id){
        alert("Introduce un ID");
        return;
    }

    fetch("/delete/" + id, {
        method: "DELETE"
    })
    .then(response => {
        document.getElementById("result").innerText =
            "Respuesta del servidor: " + response.status;
    })
    .catch(error => {
        document.getElementById("result").innerText =
            "Error al enviar DELETE";
    });
}

</script>

</body>
</html>
