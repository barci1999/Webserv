<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>405 - Method Not Allowed</title>

<link rel="stylesheet" href="error.css">

</head>

<body>

<div class="container">

<div class="card">

<h1 class="error">405</h1>

<h2>Method Not Allowed</h2>

<p>
El método HTTP utilizado no está permitido para este recurso.
</p>

<p>
Esto puede ocurrir por:
</p>

<ul style="text-align:left;max-width:400px;margin:auto;">
<li>Uso de un método no soportado (GET, POST, DELETE)</li>
<li>Restricciones en allowed_methods de la location</li>
<li>Ruta válida pero método inválido</li>
</ul>

<a class="button" href="/">Volver al inicio</a>

</div>

</div>

</body>
</html>
