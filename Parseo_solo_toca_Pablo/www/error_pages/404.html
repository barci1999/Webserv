<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>404 - Página no encontrada</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#111827;
    margin:0;
}

header{

    color:white;
    padding:20px 40px;
}

.container{
    max-width:800px;
    margin:auto;
    padding:60px;
}

.card{
    background:white;
    padding:40px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.error{

    color:#dc2626;
    margin:0;
}

.button{
    display:inline-block;
    margin-top:20px;
    background:#2563eb;
    color:white;
    padding:12px 20px;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
}

.button:hover{
    background:#1d4ed8;
}

</style>

</head>

<body>

<header>
<h1>MiniForum</h1>
<p>Error del servidor</p>
</header>

<div class="container">

<div class="card">

<p>
El recurso que estás buscando no existe en este servidor.
</p>

<a class="button" href="../index.html">Volver al inicio</a>

</div>

</div>

</html>
