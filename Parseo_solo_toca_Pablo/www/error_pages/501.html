<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>501 - Not Implemented</title>

<link rel="stylesheet" href="error.css">

</head>

<body>

<div class="container">

<div class="card">

<h1 class="error">501</h1>

<h2>Not Implemented</h2>

<p>
El servidor no soporta la funcionalidad requerida para procesar esta solicitud.
</p>

<p>
Esto puede ocurrir por:
</p>

<ul style="text-align:left;max-width:400px;margin:auto;">
<li>Método HTTP no implementado en el servidor</li>
<li>Funcionalidad no desarrollada (ej: CGI no soportado)</li>
<li>Endpoint existente pero sin lógica asociada</li>
</ul>

<a class="button" href="/">Volver al inicio</a>

</div>

</div>

</body>
</html>
