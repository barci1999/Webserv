<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>403 - Forbidden</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#111827;
    margin:0;
}

header{
    background:#1f2937;
    color:white;
    padding:20px 40px;
}

.container{
    max-width:800px;
    margin:auto;
    padding:60px;
}

.card{
    background:white;
    padding:40px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.error{
    font-size:80px;
    color:#ef4444;
}

code{
    background:#e5e7eb;
    padding:4px 6px;
    border-radius:4px;
}

.button{
    display:inline-block;
    margin-top:20px;
    background:#2563eb;
    color:white;
    padding:12px 20px;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
}

.button:hover{
    background:#1d4ed8;
}

</style>

</head>

<body>

<header>
<h1>MiniForum</h1>
<p>Error del servidor</p>
</header>

<div class="container">

<div class="card">

<h1 class="error">403</h1>

<h2>Forbidden</h2>

<p>
No tienes permisos para acceder a este recurso.
</p>

<p>
Ejemplo:
</p>

<code>GET /admin</code>

<p>
cuando el acceso está restringido a usuarios autorizados
</p>

<code>Usuarios autenticados con permisos de administrador</code>

<br><br>

<a class="button" href="../index.html">Volver al inicio</a>

</div>

</div>

</body>
</html>
