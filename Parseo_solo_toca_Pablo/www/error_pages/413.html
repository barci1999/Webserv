<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>413 - Payload Too Large</title>

<link rel="stylesheet" href="/error.css">

</head>

<body>

<div class="container">

<div class="card">

<h1 class="error">413</h1>

<h2>Payload Too Large</h2>

<p>
El tamaño de la solicitud excede el límite permitido por el servidor.
</p>

<p>
Esto puede ocurrir por:
</p>

<ul style="text-align:left;max-width:400px;margin:auto;">
<li>Archivo subido demasiado grande</li>
<li>Límite de client_max_body_size excedido</li>
<li>Body de la petición demasiado pesado</li>
</ul>

<a class="button" href="/">Volver al inicio</a>

</div>

</div>

</body>
</html>
