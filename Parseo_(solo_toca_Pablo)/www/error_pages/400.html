<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>400 - Bad Request</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#111827;
    margin:0;
}

header{
    background:#1f2937;
    color:white;
    padding:20px 40px;
}

.container{
    max-width:800px;
    margin:auto;
    padding:60px;
}

.card{
    background:white;
    padding:40px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.error{
    font-size:80px;
    color:hsl(0, 99%, 50%);
}

.button{
    display:inline-block;
    margin-top:20px;
    background:#2563eb;
    color:white;
    padding:12px 20px;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
}

.button:hover{
    background:#1d4ed8;
}

</style>

</head>

<body>

<header>
<h1>MiniForum</h1>
<p>Error del servidor</p>
</header>

<div class="container">

<div class="card">

<h1 class="error">400</h1>

<h2>Bad Request</h2>

<p>
El servidor no pudo procesar la solicitud enviada por el cliente.
</p>

<p>
Esto puede ocurrir por:
</p>

<ul style="text-align:left;max-width:400px;margin:auto;">
<li>Headers inválidos</li>
<li>Body mal formado</li>
<li>Petición HTTP corrupta</li>
</ul>

<a class="button" href="../index.html">Volver al inicio</a>

</div>

</div>

</body>
</html>
